<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수연의 작업실</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="contact">
  <main id="main" class="contact-page transition-main" data-page="contact">
    <section class="contact l-fullspan" aria-labelledby="contact-title">
      <div class="contact__inner">
        <header class="contact__header visually-hidden">
          <h1 id="contact-title" class="contact__title">연락 방법</h1>
        </header>
        <p class="contact__lead">Available for thoughtful web projects.</p>
        <ul class="contact-list" aria-label="연락 방법 목록">
          <li class="contact-card">
            <a class="contact-card__link" href="mailto:suyeonn113@naver.com">
              <span class="contact-card__body">
                <strong class="contact-card__title">Email</strong>
                <span class="contact-card__text">suyeonn113@naver.com</span>
                <span class="contact-card__note">Project inquiries<br>and collaboration</span>
              </span>
            </a>
          </li>

          <li class="contact-card">
            <a class="contact-card__link" href="https://github.com/suyeonn113" target="_blank" rel="noopener">
              <span class="contact-card__body">
                <strong class="contact-card__title">GitHub</strong>
                <span class="contact-card__text">github.com/suyeonn113</span>                
                <span class="contact-card__note">Archive of code<br>and visual experiments</span>
              </span>
            </a>
          </li>

          <li class="contact-card">
            <a class="contact-card__link" href="./assets/files/resume.pdf" target="_blank" rel="noopener">
              <span class="contact-card__body">
                <strong class="contact-card__title">Resume</strong>
                <span class="contact-card__text">PDF 보기</span>
                <span class="contact-card__note">Profile, skills<br>and experience</span>
              </span>
            </a>
          </li>
        </ul>
      </div>
    </section>
  </main>
  
  <div class="door-transition" aria-hidden="true">
    <div class="door-transition__panel"></div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
